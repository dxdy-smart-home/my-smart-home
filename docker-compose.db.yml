services:
  postgresql:
    image: postgres:15-alpine3.17
    restart: always
    network_mode: host
    environment:
      - TZ=Europe/Moscow
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=homeassistant
      - POSTGRES_HOST_AUTH_METHOD=md5
      - POSTGRES_INITDB_ARGS="-E utf8"
    volumes:
      - ./postgresql/pgdata:/var/lib/postgresql/data