services:
  torrserver:
    image: ghcr.io/yourok/torrserver:latest
    restart: always
    network_mode: host
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./torrserver/db:/TS/db
  caddy:
    container_name: caddy
    image: caddy:2.11.1-alpine
    restart: always
    network_mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/data:/data
      - ./caddy/config:/config
      - ./caddy/auth:/etc/caddy/auth
  homeassistant:
    container_name: homeassistant
    image: homeassistant/home-assistant:2026.3.2
    restart: always
    privileged: true
    depends_on:
      - postgresql
    volumes:
      - ./homeassistant/config:/config
    network_mode: host
    environment:
      - TZ=Europe/Moscow
  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:1.6.8
    network_mode: host
    restart: always
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/conf.d:/mosquitto/conf.d
      - ./mqtt/ssl:/mosquitto/ssl
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt:2.8.0
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    restart: always
    user: root
    privileged: true
    network_mode: host
    environment:
      - TZ=Europe/Moscow
#  esphome:
#    container_name: esphome
#    image: esphome/esphome:2025.6.3
#    volumes:
#      - ./esphome/config:/config
#    restart: always
#    privileged: true
#    network_mode: host
#    environment:
#      - TZ=Europe/Moscow
  syncthing:
    image: syncthing/syncthing:2.0.13
    container_name: syncthing
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - STGUIADDRESS=127.0.0.1:8384
    volumes:
      - ./syncthing:/var/syncthing
    network_mode: host
    restart: always